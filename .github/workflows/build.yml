name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - run: npm run build:chrome

      - run: npm run build:firefox

      - name: Validate Firefox build with addons-linter
        run: npx --yes addons-linter@10 dist/firefox

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: dist/chrome

      - uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: dist/firefox
