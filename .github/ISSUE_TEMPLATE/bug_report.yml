name: Bug report
description: Report a problem so we can fix it quickly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. A short report is totally fine.

  - type: textarea
    id: brief_explanation
    attributes:
      label: Brief explanation
      description: What happened, and what did you expect instead?
      placeholder: A short description of the issue.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce (if possible)
      description: Please share simple steps if you can.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (if possible)
      description: Drag and drop screenshots here if they help explain the issue.
    validations:
      required: false
